name: Update k3s References
on:
  workflow_dispatch:
    inputs:
      versions:
        type: string
        description: 'targetted k3s versions separated by commas (e.g. v1.33.13,v1.34.9,v1.35.6,v1.36.2)'
        required: true
      trigger-rke2:
        type: boolean
        description: 'trigger rke2 references update workflow'
        required: false
        default: false

jobs:
  define-matrix:
    name: "Define Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    permissions: {}
    steps:
      - name: "Set Matrix"
        id: set-matrix
        env:
          VERSIONS: ${{ github.event.inputs.versions }}
        run: |
          # jq splits the string into a valid JSON array
          JSON_ARRAY=$(echo "$VERSIONS" | jq -R 'split(",")' -c)
          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT

  update-references:
    name: "Update K3s ${{ matrix.version }} References"
    needs: define-matrix
    strategy:
      matrix:
        version: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    permissions:
      id-token: write
    runs-on: runs-on,runner=16cpu-linux-x64,run-id=${{ github.run_id }},image=ubuntu24-full-x64,hdd=256
    steps:
      - name: "Checkout `ecm-config.json`"
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
          sparse-checkout: |
            ecm-config.json

      - name: "Read Secrets"
        uses: rancher-eio/read-vault-secrets@0da85151ad1f19ed7986c41587e45aac1ace74b6 # v3
        with:
          secrets: |
            secret/data/github/repo/rancher/${{ github.repository }}/github/app-credentials appId | APP_ID ;
            secret/data/github/repo/rancher/${{ github.repository }}/github/app-credentials privateKey | PRIVATE_KEY ;

      - name: "Generate GitHub App token"
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.PRIVATE_KEY }}
          repositories: k3s-io/k3s

          permission-pull-requests: write
          permission-contents: write

      - name: "Configure git to use HTTPS instead of SSH"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "git@github.com:"
          git config --global user.name "eio-github-actions-power-enhancer[bot]"
          git config --global user.email "eio-github-actions-power-enhancer[bot]@users.noreply.github.com"

      - name: "Setup `ecm-distro-tools` CLI"
        uses: rancher/ecm-distro-tools@b558c3371d4a363f131e31a87d5c47dae2bbebe7 # v0.75.1

      - name: "Generate Tags list"
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          VERSION: ${{ matrix.version }}
        run: release generate k3s tags ${VERSION}

      - name: "Push Kubernetes Tags"
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          VERSION: ${{ matrix.version }}
        run: release push k3s tags ${VERSION}

      - name: "Open `k3s-io/k3s` PR Updating References"
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          VERSION: ${{ matrix.version }}
        run: release update k3s references ${VERSION}

  trigger-rke2-update:
    name: "Trigger RKE2 References Update"
    needs: update-references
    if: ${{ inputs.trigger-rke2 == true }}
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: "Read Secrets"
        uses: rancher-eio/read-vault-secrets@0da85151ad1f19ed7986c41587e45aac1ace74b6 # v3
        with:
          secrets: |
            secret/data/github/repo/rancher/${{ github.repository }}/github/app-credentials appId | APP_ID ;
            secret/data/github/repo/rancher/${{ github.repository }}/github/app-credentials privateKey | PRIVATE_KEY ;

      - name: "Generate GitHub App token"
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
          permission-actions: write

      - name: "Trigger RKE2 references update workflow"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          VERSIONS: ${{ inputs.versions }}
          REPO: ${{ github.repository }}
        run: |
          gh workflow run update-rke2-references.yml \
            --repo "$REPO" \
            --field version="$VERSIONS"
