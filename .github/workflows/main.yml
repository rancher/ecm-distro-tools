name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          check-latest: false
          cache: true
          cache-dependency-path: 'go.sum'
      - name: Make ECM Distro Tools
        run: |
          make all
          make test

