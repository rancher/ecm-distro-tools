name: Update RKE2 References
on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        description: 'targetted RKE2 versions separated by commas (e.g. v1.33.13,v1.34.9,v1.35.6,v1.36.2)'
        required: true

jobs:
  define-matrix:
    name: "Define Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    permissions: {}
    steps:
      - name: "Set Matrix"
        id: set-matrix
        env:
          VERSIONS: ${{ github.event.inputs.version }}
        run: |
          # jq splits the string into a valid JSON array
          JSON_ARRAY=$(echo "$VERSIONS" | jq -R 'split(",")' -c)
          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT

  update-references:
    name: "Update RKE2 ${{ matrix.version }} References"
    needs: define-matrix
    strategy:
      matrix:
        version: ${{ fromJSON(needs.define-matrix.outputs.matrix) }}
    permissions:
      id-token: write
    runs-on: runs-on,runner=8cpu-linux-x64,run-id=${{ github.run_id }},image=ubuntu24-full-x64,hdd=256
    steps:
      - name: "Checkout `ecm-config.json`"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          sparse-checkout: |
            ecm-config.json

      - name: "Read Secrets"
        uses: rancher-eio/read-vault-secrets@0da85151ad1f19ed7986c41587e45aac1ace74b6 # v3
        with:
          secrets: |
            secret/data/github/repo/rancher/${{ github.repository }}/github/app-credentials appId | APP_ID ;
            secret/data/github/repo/rancher/${{ github.repository }}/github/app-credentials privateKey | PRIVATE_KEY ;

      - name: "Generate GitHub App token"
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ env.APP_ID }}
          private-key: ${{ env.PRIVATE_KEY }}
          repositories: rancher/rke2

          permission-pull-requests: write
          permission-contents: write

      - name: "Configure git to use HTTPS instead of SSH"
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "git@github.com:"
          git config --global user.name "eio-github-actions-power-enhancer[bot]"
          git config --global user.email "eio-github-actions-power-enhancer[bot]@users.noreply.github.com"

      - name: "Setup `ecm-distro-tools` CLI"
        uses: rancher/ecm-distro-tools@e9b6789032dbe9e289ccc6f7532da8fd349922b3 # v0.75.0

      - name: "Open `rancher/rke2` PR Updating References"
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          VERSION: ${{ matrix.version }}
        run: release update rke2 references ${VERSION}
